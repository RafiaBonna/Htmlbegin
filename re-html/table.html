<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables Practice - Rowspan & Colspan</title>
    <style>
        /* 1. Making the whole table clean and joined together */
        table {
            border-collapse: collapse;
            width: 70%; /* Increased width slightly for more columns */
            margin: 20px auto;
            font-family: Arial, Helvetica, sans-serif;
        }
        /* 2. Drawing borders and padding for every single cell */
        th, td {
            border: 2px solid black;
            padding: 12px;
            text-align: center;
        }
        /* 3. Making the headers look different from data rows */
        th {
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        /* Highlighting the merged cells for better visualization */
        .merged-cell {
            background-color: #e6f7ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Student Information Table</h1>

    <table>
        
<caption>Table for Data</caption>

        <tr>
            <th>Student Name</th>
            <th>Course</th>
            <th>Institute Name</th> <th>Status</th>         </tr>

        <tr>
            <td>Bonni</td>
            <td>WDPF</td>
            <td rowspan="2" class="merged-cell">IT Academy</td>
            <td>Passing (2025)</td>
        </tr>

        <tr>
            <td>Joya</td>
            <td>Graphics Design</td>
            <td>Passing (2026)</td>
        </tr>

        <tr>
            <td>Special Note</td>
            <td colspan="3" class="merged-cell">All records are verified by the admissions office.</td>
        </tr>
    </table>

</body>
</html>
