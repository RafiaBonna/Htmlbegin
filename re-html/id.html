<!DOCTYPE html>
<html>
<head>
<style>
/* Style the element with the id "myHeader" */
#myHeader {
  background-color: lightblue;
  color: black;
  padding: 40px;
  text-align: center;
}

/* Style all elements with the class name "city" */
.city {
  background-color: tomato;
  color: white;
  padding: 10px;
} 
</style>
</head>
<body>

<h2>Difference Between Class and ID</h2>
<p>A class name can be used by multiple HTL elmentwian i name must only be used by one HTML element within the page:</p>

<!-- An element with a unique id -->
<h1 id="myHeader">My Cities</h1>

<!-- Multiple elements with same class --
<h2 class="city">Riyadh</h2>
<p>Riyadh is the capital of Saudi Arabia.</p>
<h2 class="city">Dhaka</h2>
<p>Dhaka is the capital of Bangladesh.</p>

<h2 class="city">Islamabad </h2>
<p>Islamabad  is the capital of Pakistan.</p>

</body>
</html>
