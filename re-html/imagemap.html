<!DOCTYPE html>
<html>
<head>
    <title>HTML Image Maps Practice</title>
</head>
<body>

    <h1>Interactive Image Map Showcase</h1>
    <p>Click on the different objects in the image below to trigger acti</p>

    <img src="https://www.w3schools.com/html/workplace.jpg" 
         alt="Workplace setup"
         usemap="#workmap" 
         style="width: 400px; height: 379px; border: 1px solid rgb(0, 0, 0);">

    <map name="workmap">
        <area shape="rect" coords="34,44,270,350" alt="Computer" href="https://www.google.com" target="_blank">
        
        <area shape="rect" coords="290,172,333,250" alt="Phone" href="https://www.w3schools.com" target="_blank">
        
        <area shape="circle" coords="337,300,44" alt="Coffee" href="#" onclick="showCoffeeMessage(); return false;">
    </map>

    <script>
        function showCoffeeMessage() {
            alert("You successfully clicked the interactive coffee cup area!");
        }
    </script>

</body>
</html>
