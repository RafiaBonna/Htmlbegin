<!DOCTYPE html>
<html>
<head>
    <title>HTML Image Maps Practice</title>
</head>
<body>

    <h1>Interactive Image Map Showcase </h1>
    <p>Click on the different objects in the image below to trigger actions:</p>

    <!-- The image is linked to the map via usemap attribute-->
         <img src="https://www.w3schools.com/html/workplace.jpg" alt="Workplace setup"
          usemap="#workmap" 
          style="width: 400ps; height: 379px; border: 1px solid black;">

    <!--Defining the clickable areas map-->
    <map name="workmap">
        <!-- Area 1: The Computer Screen (Rectangle) -->
        <area shape="rect" coords="34,44,270,350" alt="Computer" href="https://www.google.com" target="_blank">
        
        <!-- Area 2: The Smartphone (Rectangle) -->
        <area shape="rect" coords="290,172,333,250" alt="Phone" href="https://www.w3schools.com" target="_blank">
        
        <!-- Area 3: The Coffee Cup (Circle with Javascript Alert) -->
        <area shape="circle" coords="337,300,44" alt="Coffee" href="#" onclick="showCoffeeMessage(); return false;">
    </map>
    <map name="workmap">
        <!-- Area 1: The computer screen(Rectangle) -->
         <area shape="rect" coords="" href="" alt="">
    </map>

    <!-- JavaScript function fr th  it-->
    <script>
        function showCoffeeMessage() {
            alert("You successfully clicked the interactive coffee cup area!");
        }
    </script>

</body>
</html>
