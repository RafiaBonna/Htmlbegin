<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!DOCTYPE html>
<html>
<head>
    <title>HTML Image Practice</title>
</head>
<body>

    <h2>Adding Images to My Page</h2>

    <!-- ১. Correct image and correct size (using CSS Style) -->
    <p>Below is a beautiful technology image:</p>
    <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=400&q=80" 
         alt="A coding laptop" 
         style="width:300px; height:200px; border: 2px solid darkblue;">

    <hr>

    <!-- ২. Wrong image name (to show how alt attribute works) -->
    <p>The image link below is intentionally incorrect:</p>
    <img src="wrong_picture_name.jpg" alt="The image link could not be found">

</body>
</html>
