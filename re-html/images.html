<body>

    <h2>Adding image to my page</h2>

    <!-- 1. Correct image and correct size (using CSS Style) -->

    <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=400&q=80" alt=" A coding laptop"
     style="width: 300px; height: 200px; border: 2px solid darkblue;">

    <!-- 2. Wrong image name (to show how alt attribute works) -->

    <img src="Wrong_picture_name.jpg" alt="The image link could not be found">
