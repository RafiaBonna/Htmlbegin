<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
a:link{
    color:green;
    background-color: transparent;
    text-decoration: none;
}
a:visited{
    color: pink;
    background-color: transparent;
    text-decoration: none;
}
a:hover{
    color: red;
    background-color: transparent;
    text-decoration: none;
}
a:active{
   color: yellow; 
   background-color: transparent;
   text-decoration: underline;
}
    </style>
    <title>HTML-LINKS-Colors</title>
</head>
<body>
 <h2>Links colors</h2>   
 <p>You can change the defaul </p>
 <a href="https://www.youtube.com" target="_blank">YouTube</a>
</body>
</html>
